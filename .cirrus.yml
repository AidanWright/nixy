task:
  name: darwin-rebuild
  macos_instance:
    image: ghcr.io/aidanwright/nixy/base-26.05:latest
    user: admin
    password: admin
    cpu: 4
    memory: 8192
  apply_config_script:
    - sudo launchctl bootstrap system /Library/LaunchDaemons/org.nixos.nix-daemon.plist 2>/dev/null || true
    - sudo launchctl kickstart -k system/org.nixos.nix-daemon 2>/dev/null || true
    - until sudo /nix/var/nix/profiles/default/bin/nix store ping >/dev/null 2>&1; do sleep 2; done
    - sudo /run/current-system/sw/bin/darwin-rebuild switch --flake "path:$(realpath $CIRRUS_WORKING_DIR)#macbook"
